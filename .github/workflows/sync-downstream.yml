name: Sync to Downstream Repos

on:
  push:
    branches: [dev]
    paths-ignore:
      - '**.md'
      - '.ai-context/**'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-promps-ent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Promps-Ent sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          repository: BonoJovi/Promps-Ent
          event-type: sync-from-upstream
          client-payload: '{"source": "Promps", "ref": "${{ github.sha }}"}'

      - name: Log dispatch
        run: |
          echo "Dispatched sync-from-upstream to Promps-Ent"
          echo "Source commit: ${{ github.sha }}"
