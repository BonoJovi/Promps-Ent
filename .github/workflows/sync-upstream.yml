name: Sync from Upstream

on:
  repository_dispatch:
    types: [sync-from-upstream]
  workflow_dispatch:

jobs:
  sync-from-promps-ent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/BonoJovi/Promps-Pro.git
          git fetch upstream dev

      - name: Merge upstream changes
        id: merge
        run: |
          # Files to keep local version (version-specific or repo-specific files)
          VERSION_FILES=(
            "Cargo.toml"
            "package.json"
            "tauri.conf.json"
            ".ai-context/ESSENTIAL.md"
            "README.md"
            "res/js/blockly-config.js"
            ".github/workflows/sync-upstream.yml"
            ".github/workflows/release.yml"
          )

          # Try to merge upstream/dev into current branch
          if git merge upstream/dev --no-edit -m "chore: sync from upstream Promps-Ent [skip ci]"; then
            echo "merge_status=success" >> $GITHUB_OUTPUT

            # Check if there are actual changes to push
            if git diff --quiet HEAD~1 HEAD 2>/dev/null; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Merge conflict detected, attempting auto-resolution..."

            # Resolve version files by keeping ours
            for file in "${VERSION_FILES[@]}"; do
              if git diff --name-only --diff-filter=U | grep -q "^${file}$"; then
                echo "Resolving conflict in ${file} (keeping ours)"
                git checkout --ours "${file}"
                git add "${file}"
              fi
            done

            # Check if there are remaining conflicts
            REMAINING_CONFLICTS=$(git diff --name-only --diff-filter=U || true)
            if [ -z "$REMAINING_CONFLICTS" ]; then
              echo "All conflicts resolved automatically"
              git commit --no-edit
              echo "merge_status=success" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "Remaining conflicts in: $REMAINING_CONFLICTS"
              echo "merge_status=conflict" >> $GITHUB_OUTPUT
              echo "has_changes=false" >> $GITHUB_OUTPUT
              git merge --abort
            fi
          fi

      - name: Push changes
        if: steps.merge.outputs.merge_status == 'success' && steps.merge.outputs.has_changes == 'true'
        run: git push origin dev

      - name: Report status
        run: |
          echo "Merge status: ${{ steps.merge.outputs.merge_status }}"
          echo "Has changes: ${{ steps.merge.outputs.has_changes }}"
          if [ "${{ steps.merge.outputs.merge_status }}" == "conflict" ]; then
            echo "::warning::Merge conflict detected. Manual intervention required."
          fi
